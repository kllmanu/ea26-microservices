services:
  traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true" # Enables the Traefik Dashboard
      - "--providers.docker=true" # Enables Service Discovery
    ports:
      - "80:80" # Public Traffic
      - "8080:8080" # The Traefik Dashboard UI
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  user:
    build: user
    labels:
      - "traefik.enable=true"
      # 1. Change the rule to match the path instead of the hostname
      - "traefik.http.routers.user.rule=Host(`localhost`) && PathPrefix(`/user`)"
      # 2. Add a middleware to strip the "/user" prefix before sending traffic to the app
      - "traefik.http.middlewares.user-strip.stripprefix.prefixes=/user"
      - "traefik.http.routers.user.middlewares=user-strip"
      # 3. Explicitly define the internal port
      - "traefik.http.services.user.loadbalancer.server.port=8081"

  product:
    build: product
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.product.rule=Host(`localhost`) && PathPrefix(`/product`)"
      - "traefik.http.middlewares.product-strip.stripprefix.prefixes=/product"
      - "traefik.http.routers.product.middlewares=product-strip"
      - "traefik.http.services.product.loadbalancer.server.port=8082"

  ordering:
    build: ordering
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ordering.rule=Host(`localhost`) && PathPrefix(`/ordering`)"
      - "traefik.http.middlewares.ordering-strip.stripprefix.prefixes=/ordering"
      - "traefik.http.routers.ordering.middlewares=ordering-strip"
      - "traefik.http.services.ordering.loadbalancer.server.port=8083"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  swagger:
    image: swaggerapi/swagger-ui:latest
    environment:
      - 'URLS=[{ "url": "http://localhost/user/v3/api-docs", "name": "User Service" }, { "url": "http://localhost/product/v3/api-docs", "name": "Product Service" }, { "url": "http://localhost/ordering/v3/api-docs", "name": "Ordering Service" }]'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.swagger.rule=Host(`localhost`) && PathPrefix(`/swagger`)"
      - "traefik.http.middlewares.swagger-strip.stripprefix.prefixes=/swagger"
      - "traefik.http.routers.swagger.middlewares=swagger-strip"
      - "traefik.http.services.swagger.loadbalancer.server.port=8080"

  hive-gateway:
    build: ./gateway
    environment:
      - NODE_ENV=production
    volumes:
      - ./gateway/mesh.config.ts:/gateway-build/mesh.config.ts
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`localhost`) && PathPrefix(`/hive`)"
      - "traefik.http.middlewares.gateway-strip.stripprefix.prefixes=/hive"
      - "traefik.http.routers.gateway.middlewares=gateway-strip"
      - "traefik.http.services.gateway.loadbalancer.server.port=4000"
    depends_on:
      - user
      - product
      - ordering

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=http://localhost/prometheus/"
      - "--web.route-prefix=/"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`localhost`) && PathPrefix(`/prometheus`)"
      - "traefik.http.middlewares.prometheus-strip.stripprefix.prefixes=/prometheus"
      - "traefik.http.routers.prometheus.middlewares=prometheus-strip"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    environment:
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`localhost`) && PathPrefix(`/grafana`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
