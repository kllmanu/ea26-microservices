services:
  traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true" # Enables the Traefik Dashboard
      - "--providers.docker=true" # Enables Service Discovery
    ports:
      - "80:80"     # Public Traffic
      - "8080:8080" # The Traefik Dashboard UI
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  user:
    build: user
    labels:
      - "traefik.enable=true"
      # 1. Change the rule to match the path instead of the hostname
      - "traefik.http.routers.user.rule=Host(`localhost`) && PathPrefix(`/user`)"
      # 2. Add a middleware to strip the "/user" prefix before sending traffic to the app
      - "traefik.http.middlewares.user-strip.stripprefix.prefixes=/user"
      - "traefik.http.routers.user.middlewares=user-strip"
      # 3. Explicitly define the internal port
      - "traefik.http.services.user.loadbalancer.server.port=8081"
