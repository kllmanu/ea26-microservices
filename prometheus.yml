global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'product-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['product:8082']

  - job_name: 'ordering-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ordering:8083']
